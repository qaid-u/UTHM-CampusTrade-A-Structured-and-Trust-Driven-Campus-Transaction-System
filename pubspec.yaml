name: uthm_campustrade
description: A campus marketplace app for UTHM students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0-0

dependencies:
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.7.0
  firebase_core: ^3.8.0
  firebase_storage: ^12.3.6
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  google_fonts: 6.3.3
  image: ^4.5.2
  image_cropper: ^12.2.1
  image_picker: ^1.2.2
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  path_provider: 2.1.4
  path_provider_android: 2.2.10
  path_provider_foundation: 2.4.0
  image_picker_ios: 0.8.9+2

flutter:
  uses-material-design: true
